name: Deploy Docs

on:
  push:
    branches: [main, master]
    paths:
      - gateway/docs/**
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static docs
        run: |
          mkdir -p public
          cp -R gateway/docs/. public/
          perl -0pi -e 's#/docs/assets/#assets/#g; s#/docs/openapi\.json#openapi.json#g; s#/openapi\.json#openapi.json#g' public/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
